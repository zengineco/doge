<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DogeFundMe — The Guest Book</title>
<!--
// ============================================================
// Author: Vincent Gonzalez | © 2026 Zengine™ | www.zengine.site
// Project: DogeFundMe
// File: guestbook.html
// Version: 1.0.0
// ------------------------------------------------------------
// CHANGE LOG v1.0.0:
//   - Initial build — full guest book history page
//   - Matches dogefundme_qr_v1.2.0.html design system
//   - Hotel lobby / gold-leaf aesthetic
//   - Fetches entries from Web3Forms submissions display
//   - Search + filter by date
//   - Back link to main page
// ============================================================
-->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=Space+Mono:wght@400;700&family=IM+Fell+English:ital@0;1&display=swap" rel="stylesheet">

<style>
:root {
  --navy-900: #04091a;
  --navy-800: #070e28;
  --navy-700: #0b1535;
  --navy-600: #0f1f3d;
  --navy-500: #162847;
  --navy-400: #1e3560;
  --gold-bright: #f0c060;
  --gold:        #c9963a;
  --gold-dim:    #8a6020;
  --gold-glass:  rgba(201,150,58,0.12);
  --glass-bg:    rgba(15,31,61,0.55);
  --glass-border: rgba(201,150,58,0.18);
  --glass-border-hi: rgba(201,150,58,0.35);
  --glass-blur:  blur(18px);
  --cream:    #f0e8d0;
  --cream-dim:#b8a888;
  --blue-mute:#5a7898;
  --blue-hint:#3a5068;
  --font-head: 'Syne', sans-serif;
  --font-mono: 'Space Mono', monospace;
  --font-serif: 'IM Fell English', serif;
  --r-sm: 8px;
  --r-md: 14px;
  --r-lg: 20px;
  --r-xl: 28px;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }

body {
  background: var(--navy-900);
  color: var(--cream);
  font-family: var(--font-mono);
  font-size: 14px;
  min-height: 100vh;
  overflow-x: hidden;
}

body::before {
  content: '';
  position: fixed;
  inset: 0;
  background:
    radial-gradient(ellipse 60% 50% at 15% 10%, rgba(30,53,96,0.7) 0%, transparent 60%),
    radial-gradient(ellipse 50% 60% at 85% 80%, rgba(15,31,61,0.8) 0%, transparent 60%);
  pointer-events: none;
  z-index: 0;
}

body::after {
  content: '';
  position: fixed;
  inset: 0;
  background-image:
    linear-gradient(rgba(201,150,58,0.025) 1px, transparent 1px),
    linear-gradient(90deg, rgba(201,150,58,0.025) 1px, transparent 1px);
  background-size: 48px 48px;
  pointer-events: none;
  z-index: 0;
}

.page-wrap {
  position: relative;
  z-index: 1;
  max-width: 860px;
  margin: 0 auto;
  padding: 0 24px 80px;
}

/* ============================================================
   HEADER
   ============================================================ */
header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 28px 0 32px;
  border-bottom: 1px solid var(--glass-border);
  margin-bottom: 48px;
}

.back-link {
  display: flex;
  align-items: center;
  gap: 8px;
  text-decoration: none;
  font-size: 11px;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: var(--blue-mute);
  transition: color 0.2s;
}

.back-link:hover { color: var(--gold); }

.logo-mark { display: flex; align-items: center; gap: 12px; }

.logo-coin {
  width: 40px;
  height: 40px;
  background: linear-gradient(135deg, var(--gold), var(--gold-bright));
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: Georgia, serif;
  font-weight: 700;
  font-size: 18px;
  color: var(--navy-900);
  box-shadow: 0 0 0 3px var(--gold-glass);
}

.logo-main {
  font-family: var(--font-head);
  font-weight: 800;
  font-size: 18px;
  color: var(--gold-bright);
  letter-spacing: -0.5px;
}

/* ============================================================
   BOOK COVER
   ============================================================ */
.book-cover {
  background: linear-gradient(160deg, #0c1828 0%, #060c1c 100%);
  border: 1px solid rgba(201,150,58,0.3);
  border-radius: var(--r-xl);
  overflow: hidden;
  box-shadow: 0 32px 80px rgba(0,0,0,0.7), inset 0 1px 0 rgba(201,150,58,0.15);
  margin-bottom: 32px;
}

/* Decorative spine strip */
.book-spine {
  height: 6px;
  background: linear-gradient(90deg,
    var(--gold-dim) 0%,
    var(--gold) 20%,
    var(--gold-bright) 50%,
    var(--gold) 80%,
    var(--gold-dim) 100%
  );
}

.book-header {
  background: linear-gradient(135deg, #0f1f3d 0%, #162847 50%, #0b1530 100%);
  border-bottom: 1px solid rgba(201,150,58,0.25);
  padding: 48px 56px 40px;
  text-align: center;
  position: relative;
  overflow: hidden;
}

/* Diagonal hatch texture */
.book-header::before {
  content: '';
  position: absolute;
  inset: 0;
  background: repeating-linear-gradient(
    -45deg,
    transparent,
    transparent 12px,
    rgba(201,150,58,0.015) 12px,
    rgba(201,150,58,0.015) 13px
  );
  pointer-events: none;
}

/* Corner ornaments */
.book-header::after {
  content: '✦';
  position: absolute;
  bottom: 16px;
  right: 24px;
  font-size: 18px;
  color: rgba(201,150,58,0.2);
}

.book-ornament-top {
  font-size: 14px;
  letter-spacing: 12px;
  color: rgba(201,150,58,0.4);
  margin-bottom: 16px;
}

.book-title {
  font-family: var(--font-serif);
  font-size: clamp(32px, 5vw, 52px);
  color: var(--gold-bright);
  font-weight: 400;
  letter-spacing: 1px;
  margin-bottom: 8px;
  line-height: 1.1;
}

.book-subtitle {
  font-family: var(--font-serif);
  font-style: italic;
  font-size: 16px;
  color: var(--cream-dim);
  margin-bottom: 20px;
}

.book-rule {
  width: 120px;
  height: 1px;
  background: linear-gradient(90deg, transparent, var(--gold), transparent);
  margin: 0 auto 20px;
}

.book-meta {
  font-size: 11px;
  color: var(--blue-mute);
  letter-spacing: 2px;
  text-transform: uppercase;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 16px;
}

.book-meta-divider { color: rgba(201,150,58,0.3); }

/* ============================================================
   SEARCH + FILTER
   ============================================================ */
.book-controls {
  padding: 20px 40px;
  border-bottom: 1px solid rgba(201,150,58,0.08);
  display: flex;
  gap: 12px;
  align-items: center;
  flex-wrap: wrap;
}

.book-search {
  flex: 1;
  min-width: 180px;
  background: rgba(4,9,26,0.7);
  border: 1px solid var(--glass-border);
  border-radius: var(--r-sm);
  padding: 10px 14px;
  font-family: var(--font-mono);
  font-size: 12px;
  color: var(--cream);
  outline: none;
  transition: border-color 0.2s;
}

.book-search:focus { border-color: var(--gold); }
.book-search::placeholder { color: var(--blue-hint); }

.book-sort {
  background: rgba(4,9,26,0.7);
  border: 1px solid var(--glass-border);
  border-radius: var(--r-sm);
  padding: 10px 14px;
  font-family: var(--font-mono);
  font-size: 12px;
  color: var(--cream-dim);
  outline: none;
  cursor: pointer;
  transition: border-color 0.2s;
}

.book-sort:focus { border-color: var(--gold); }

.book-total {
  font-size: 11px;
  color: var(--blue-hint);
  letter-spacing: 1px;
  white-space: nowrap;
}

/* ============================================================
   ENTRIES LIST
   ============================================================ */
.book-entries {
  padding: 8px 0;
}

.book-entry {
  display: grid;
  grid-template-columns: 56px 1fr auto;
  gap: 0;
  align-items: stretch;
  border-bottom: 1px solid rgba(201,150,58,0.06);
  transition: background 0.15s;
}

.book-entry:hover {
  background: rgba(201,150,58,0.02);
}

.book-entry:last-child { border-bottom: none; }

.entry-gutter {
  padding: 24px 0 24px 40px;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 6px;
}

.entry-index {
  font-size: 11px;
  color: var(--gold-dim);
  font-family: var(--font-mono);
  letter-spacing: 0.5px;
}

.entry-dot {
  width: 4px;
  height: 4px;
  border-radius: 50%;
  background: rgba(201,150,58,0.25);
  flex-shrink: 0;
}

.entry-content {
  padding: 24px 24px 24px 16px;
}

.entry-name-large {
  font-family: var(--font-serif);
  font-size: 20px;
  color: var(--cream);
  margin-bottom: 6px;
  letter-spacing: 0.3px;
}

.entry-message-large {
  font-family: var(--font-serif);
  font-style: italic;
  font-size: 15px;
  color: var(--cream-dim);
  line-height: 1.7;
  margin-bottom: 8px;
}

.entry-message-large::before { content: '\201C'; color: var(--gold-dim); margin-right: 2px; }
.entry-message-large::after  { content: '\201D'; color: var(--gold-dim); margin-left: 2px; }

.entry-footer {
  display: flex;
  align-items: center;
  gap: 14px;
  flex-wrap: wrap;
}

.entry-date-large {
  font-size: 10px;
  color: var(--blue-hint);
  letter-spacing: 1.5px;
  text-transform: uppercase;
}

.entry-wallet-large {
  font-size: 10px;
  color: var(--gold-dim);
  font-family: var(--font-mono);
  letter-spacing: 0.5px;
}

.entry-verified {
  font-size: 9px;
  letter-spacing: 1px;
  text-transform: uppercase;
  color: var(--gold);
  border: 1px solid rgba(201,150,58,0.3);
  padding: 2px 7px;
  border-radius: 10px;
}

.entry-side {
  padding: 24px 40px 24px 0;
  display: flex;
  align-items: flex-start;
}

/* ============================================================
   EMPTY STATE
   ============================================================ */
.book-empty {
  padding: 64px 40px;
  text-align: center;
}

.book-empty-ornament {
  font-size: 32px;
  color: rgba(201,150,58,0.2);
  margin-bottom: 16px;
}

.book-empty-text {
  font-family: var(--font-serif);
  font-style: italic;
  font-size: 18px;
  color: var(--blue-mute);
}

/* ============================================================
   BOOK FOOTER
   ============================================================ */
.book-footer-strip {
  background: linear-gradient(135deg, #0f1f3d 0%, #0b1530 100%);
  border-top: 1px solid rgba(201,150,58,0.15);
  padding: 20px 40px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-wrap: wrap;
  gap: 12px;
}

.book-footer-text {
  font-family: var(--font-serif);
  font-style: italic;
  font-size: 13px;
  color: var(--blue-mute);
}

.book-footer-ornament {
  font-size: 13px;
  letter-spacing: 8px;
  color: rgba(201,150,58,0.25);
}

/* ============================================================
   BACK CTA
   ============================================================ */
.back-cta {
  text-align: center;
  margin-top: 40px;
}

.btn-back {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  text-decoration: none;
  font-family: var(--font-mono);
  font-size: 11px;
  letter-spacing: 2px;
  text-transform: uppercase;
  background: var(--gold-glass);
  border: 1px solid var(--glass-border-hi);
  color: var(--gold-bright);
  padding: 14px 28px;
  border-radius: var(--r-sm);
  transition: all 0.18s;
}

.btn-back:hover {
  background: rgba(201,150,58,0.2);
  box-shadow: 0 4px 20px rgba(201,150,58,0.2);
}

/* ============================================================
   LOADING
   ============================================================ */
.book-loading {
  padding: 48px;
  text-align: center;
  color: var(--blue-hint);
  font-size: 12px;
  letter-spacing: 2px;
  text-transform: uppercase;
}

/* Page footer */
footer {
  margin-top: 60px;
  padding-top: 28px;
  border-top: 1px solid var(--glass-border);
  display: flex;
  justify-content: space-between;
  flex-wrap: wrap;
  gap: 12px;
}

.footer-copy { font-size: 11px; color: var(--blue-hint); letter-spacing: 1px; }
.footer-link { font-size: 11px; color: var(--blue-mute); text-decoration: none; letter-spacing: 1px; transition: color 0.2s; }
.footer-link:hover { color: var(--gold); }
</style>
</head>
<body>

<div class="page-wrap">

  <header>
    <a href="./index.html" class="back-link">← Back to DogeFundMe</a>
    <div class="logo-mark">
      <div class="logo-coin">Ð</div>
      <div class="logo-main">DogeFundMe</div>
    </div>
  </header>

  <div class="book-cover">
    <div class="book-spine"></div>

    <div class="book-header">
      <div class="book-ornament-top">✦ &nbsp; ✦ &nbsp; ✦</div>
      <h1 class="book-title">The Guest Book</h1>
      <p class="book-subtitle">A record of those who were here</p>
      <div class="book-rule"></div>
      <div class="book-meta">
        <span>DogeFundMe</span>
        <span class="book-meta-divider">·</span>
        <span>Est. 2026</span>
        <span class="book-meta-divider">·</span>
        <span id="total-count-display">— signatures</span>
      </div>
    </div>

    <div class="book-controls">
      <input class="book-search" type="text" id="search-input" placeholder="Search by name or message..." oninput="filterEntries()">
      <select class="book-sort" id="sort-select" onchange="filterEntries()">
        <option value="newest">Newest first</option>
        <option value="oldest">Oldest first</option>
      </select>
      <span class="book-total" id="showing-count"></span>
    </div>

    <div class="book-entries" id="book-entries">
      <div class="book-loading">Loading signatures...</div>
    </div>

    <div class="book-footer-strip">
      <div class="book-footer-text">Every entry is permanent. Every name matters.</div>
      <div class="book-footer-ornament">✦ ✦ ✦</div>
    </div>
  </div>

  <div class="back-cta">
    <a href="./index.html" class="btn-back">← Sign the book on the main page</a>
  </div>

</div><!-- /page-wrap -->

<footer>
  <div class="footer-copy">© 2026 Zengine™ — www.zengine.site</div>
  <a href="https://dogefundme.com" class="footer-link" target="_blank" rel="noopener noreferrer">dogefundme.com</a>
</footer>

<script>
// ============================================================
// GUEST BOOK HISTORY PAGE
// ============================================================
// CONFIG BLOCK
var GUESTBOOK_PAGE = {
  entries:  [],
  filtered: []
};

// SEED ENTRIES — shown until Web3Forms submissions arrive
// Replace with a real fetch from your submissions if you wire
// a Supabase or Airtable backend later
var SEED_ENTRIES = [
  {
    index:   1,
    name:    'The Doge Himself',
    message: 'Such hotel. Very real. Wow.',
    date:    'March 2026',
    wallet:  null,
    verified: true
  },
  {
    index:   2,
    name:    'Early Believer #2',
    message: 'I was here before it was obvious. You\'re welcome.',
    date:    'March 2026',
    wallet:  null,
    verified: false
  }
];

// ============================================================
// BOOT — load seed + any localStorage entries
// ============================================================
document.addEventListener('DOMContentLoaded', function() {
  var stored = [];
  try {
    var raw = localStorage.getItem('dfm_guestbook_entries');
    if (raw) stored = JSON.parse(raw);
  } catch(e) { stored = []; }

  GUESTBOOK_PAGE.entries = SEED_ENTRIES.concat(stored);
  // Re-index
  GUESTBOOK_PAGE.entries.forEach(function(e, i) { e.index = i + 1; });

  renderEntries(GUESTBOOK_PAGE.entries);
  updateTotalCount(GUESTBOOK_PAGE.entries.length);
});

// ============================================================
// RENDER
// ============================================================
function renderEntries(list) {
  var container = document.getElementById('book-entries');
  var showing   = document.getElementById('showing-count');
  showing.textContent = list.length + ' shown';

  if (!list.length) {
    container.innerHTML =
      '<div class="book-empty">' +
        '<div class="book-empty-ornament">✦</div>' +
        '<div class="book-empty-text">No signatures match your search.</div>' +
      '</div>';
    return;
  }

  container.innerHTML = list.map(function(e) {
    var walletHtml = e.wallet
      ? '<span class="entry-wallet-large">' + e.wallet.slice(0,8) + '&hellip;' + e.wallet.slice(-6) + '</span>'
      : '';
    var verifiedHtml = e.verified
      ? '<span class="entry-verified">Founder</span>'
      : '';
    return (
      '<div class="book-entry">' +
        '<div class="entry-gutter">' +
          '<div class="entry-index">#' + e.index + '</div>' +
          '<div class="entry-dot"></div>' +
        '</div>' +
        '<div class="entry-content">' +
          '<div class="entry-name-large">' + escapeHtml(e.name) + '</div>' +
          '<div class="entry-message-large">' + escapeHtml(e.message) + '</div>' +
          '<div class="entry-footer">' +
            '<span class="entry-date-large">' + e.date + '</span>' +
            walletHtml +
            verifiedHtml +
          '</div>' +
        '</div>' +
        '<div class="entry-side"></div>' +
      '</div>'
    );
  }).join('');
}

function updateTotalCount(n) {
  document.getElementById('total-count-display').textContent = n + (n === 1 ? ' signature' : ' signatures');
}

// ============================================================
// FILTER + SORT
// ============================================================
function filterEntries() {
  var query = document.getElementById('search-input').value.toLowerCase();
  var sort  = document.getElementById('sort-select').value;

  var filtered = GUESTBOOK_PAGE.entries.filter(function(e) {
    if (!query) return true;
    return e.name.toLowerCase().indexOf(query) > -1 ||
           e.message.toLowerCase().indexOf(query) > -1;
  });

  if (sort === 'oldest') {
    filtered = filtered.slice().sort(function(a, b) { return a.index - b.index; });
  } else {
    filtered = filtered.slice().sort(function(a, b) { return b.index - a.index; });
  }

  renderEntries(filtered);
}

function escapeHtml(str) {
  if (!str) return '';
  return str
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;')
    .replace(/'/g, '&#39;');
}

// Allow main page to push new entries to localStorage so
// guestbook.html reflects them immediately on next load
// READS: window.postMessage from parent or direct localStorage write
window.addEventListener('storage', function(e) {
  if (e.key === 'dfm_guestbook_entries') {
    try {
      var fresh = JSON.parse(e.newValue || '[]');
      GUESTBOOK_PAGE.entries = SEED_ENTRIES.concat(fresh);
      GUESTBOOK_PAGE.entries.forEach(function(ent, i) { ent.index = i + 1; });
      renderEntries(GUESTBOOK_PAGE.entries);
      updateTotalCount(GUESTBOOK_PAGE.entries.length);
    } catch(err) {}
  }
});
</script>
</body>
</html>
